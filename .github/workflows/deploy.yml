# Deploy scribekit's own docs site (self-contained under site/) to GitHub Pages.
#
# This is the in-repo (dogfood) variant of skills/scribekit-docs-github-pages/assets/deploy.yml:
# site/ imports the built package from ../dist, so this builds the package first, then the static
# export. A consumer project (where @daanvandenbergh/scribekit is an npm dep) uses the plain template.
#
# The Configure Pages step below sets `enablement: true`, so Pages is turned on automatically on the
# first run (fallback if an org blocks it: Settings -> Pages -> Source: "GitHub Actions").
# The corpus (site/docs) and heroes (site/public/assets) must be committed.

name: Deploy docs to GitHub Pages

on:
    push:
        branches: [main]
    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: pages
    cancel-in-progress: false

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v7

            - name: Set up Node
              uses: actions/setup-node@v7
              with:
                  node-version: 22
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Build the package (dist/)
              run: npm run build

            - name: Configure Pages
              id: pages
              uses: actions/configure-pages@v6
              with:
                  # Enable Pages (build type "GitHub Actions") on the first run, so a fresh repo doesn't
                  # fail with "Get Pages site failed / Not Found". Needs the `pages: write` permission
                  # above. If an org policy blocks it, enable Pages once by hand instead (Settings ->
                  # Pages -> Source: "GitHub Actions") and this is a no-op.
                  enablement: true

            - name: Build the docs site (static export)
              working-directory: site
              env:
                  # next.config + the hero <img> both read this; empty (root hosting) resolves fine too.
                  NEXT_PUBLIC_BASE_PATH: ${{ steps.pages.outputs.base_path }}
              run: |
                  npx --no-install next build
                  touch out/.nojekyll

            - name: Upload artifact
              uses: actions/upload-pages-artifact@v5
              with:
                  path: site/out

    deploy:
        needs: build
        runs-on: ubuntu-latest
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v5
